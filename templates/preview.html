<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph / Social Media Preview -->
    <meta property="og:url" content="{{ original_url }}">
    <meta property="og:title" content="Redirecting...">
    <meta property="og:description" content="Click to visit the destination">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Fallback redirect for bots that don't respect meta tags -->
    <meta http-equiv="refresh" content="0; url={{ original_url }}">
    
    <title>Redirecting...</title>
</head>
<body>
    <p>Redirecting to destination...</p>
</body>
</html>
