<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        #status { color: #666; margin: 20px; }
    </style>
</head>
<body>
    <h2>Redirecting...</h2>
    <p id="status">Getting your location for analytics...</p>

    <script>
        const shortCode = "{{ short_code }}";
        const statusEl = document.getElementById('status');

        function logLocation(latitude, longitude, accuracy) {
            fetch(`/api/track/${shortCode}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: latitude,
                    longitude: longitude,
                    accuracy: accuracy
                })
            })
            .then(() => {
                // Success or failure, we redirect anyway
                window.location.href = `/redirect/${shortCode}`;
            })
            .catch(err => {
                console.error('Failed to log location:', err);
                window.location.href = `/redirect/${shortCode}`;
            });
        }

        if (navigator.geolocation) {
            statusEl.textContent = "Requesting location permission...";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("✅ Location received:", position.coords);
                    statusEl.textContent = "Location captured. Redirecting...";
                    logLocation(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                (error) => {
                    console.error("Geolocation error:", error);
                    let msg = "Location unavailable. Redirecting...";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            msg = "Permission denied. Redirecting...";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = "Position unavailable. Redirecting...";
                            break;
                        case error.TIMEOUT:
                            msg = "Request timed out. Redirecting...";
                            break;
                    }
                    statusEl.textContent = msg;
                    // Still redirect even on error
                    setTimeout(() => {
                        window.location.href = `/redirect/${shortCode}`;
                    }, 800);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            console.error("Geolocation not supported");
            window.location.href = `/redirect/${shortCode}`;
        }
    </script>
</body>
</html>
